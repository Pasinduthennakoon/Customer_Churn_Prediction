services:
  backend:
    build: ./backend
    container_name: backend_container
    ports:
    - "8000:8000"
  
  frontend:
    build: ./frontend
    container_name: frontend_container
    ports:
    - "8501:8501"
    environment:
      - API_URL=http://backend:8000/predict
    depends_on:
      - backend
    